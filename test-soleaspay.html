<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test SoleasPay ✅</title>
<style>
body{font-family:sans-serif;max-width:420px;margin:20px auto;padding:16px;background:#f5f5f5}
h3{margin-bottom:4px}p{font-size:12px;color:#555;margin-bottom:14px;line-height:1.5}
input,select{width:100%;padding:11px;margin-bottom:9px;border:1px solid #ccc;border-radius:9px;font-size:14px;box-sizing:border-box}
button{width:100%;padding:13px;border:none;border-radius:9px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:6px;color:#fff}
.g{background:#16A34A}.b{background:#3B82F6}
button:disabled{opacity:.5;cursor:not-allowed}
pre{background:#0d1117;color:#7ee787;padding:13px;border-radius:9px;font-size:11px;
  overflow-x:auto;white-space:pre-wrap;margin-top:10px;max-height:320px;overflow-y:auto}
pre.err{color:#ff7b72}pre.ok{color:#7ee787}
.badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:800;margin-bottom:12px}
.badge.ok{background:#DCFCE7;color:#166534}.badge.ko{background:#FEE2E2;color:#991B1B}
.info{background:#EFF6FF;border:1px solid #93C5FD;border-radius:8px;padding:10px 12px;font-size:12px;color:#1D4ED8;margin-bottom:12px;line-height:1.6}
</style>
</head>
<body>
<h3>🧪 Test SoleasPay Production</h3>
<div class="badge ok">✅ URL confirmée : app.soleaspay.com</div>
<div class="info">
  Le proxy <b>/api/soleaspay.js</b> utilise :<br>
  <code>https://app.soleaspay.com/api/v1/payment/collect</code>
</div>

<select id="op">
  <option value="ORANGE_CM">🍊 Orange Money CM</option>
  <option value="MTN_CM">📱 MTN MoMo CM</option>
  <option value="WAVE_CM">🌊 Wave CM</option>
</select>
<input type="tel"    id="phone"  placeholder="Votre numéro (ex: 658033690)" value="658033690">
<input type="number" id="amount" placeholder="Montant FCFA" value="100" min="1">

<button class="g" id="btnTest" onclick="tester()">⚡ Tester le prélèvement (via proxy)</button>
<button class="b"  id="btnStatus" onclick="verifierStatut()" style="display:none">🔍 Vérifier le statut</button>

<pre id="result">En attente...</pre>

<script>
let lastTxId = null;

async function tester(){
  const btn = document.getElementById('btnTest');
  const res = document.getElementById('result');
  const phone  = document.getElementById('phone').value.replace(/\s/g,'');
  const op     = document.getElementById('op').value;
  const amount = parseInt(document.getElementById('amount').value)||100;

  if(!phone || phone.length < 8){
    res.className='err';
    res.textContent='⚠️ Numéro invalide';
    return;
  }

  btn.disabled=true; btn.textContent='⏳ Envoi au proxy...';
  res.className=''; res.textContent='Appel /api/soleaspay?action=collect...';

  try{
    const r = await fetch('/api/soleaspay?action=collect',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        amount,
        currency:      'XAF',
        operator:      op,
        phone,
        reference:     'TEST-'+Date.now(),
        description:   'Test paiement VGN',
        customer_name: 'Test Client',
        customer_email:'test@vgn.cm'
      })
    });

    const data = await r.json().catch(()=>({}));
    lastTxId = data.data?.transaction_id || data.transaction_id || data.id || null;

    res.className = r.ok ? 'ok' : 'err';
    res.textContent = `HTTP ${r.status}\n`
      + (lastTxId ? `TX ID: ${lastTxId}\n` : '')
      + '\n' + JSON.stringify(data, null, 2);

    if(r.ok && lastTxId){
      document.getElementById('btnStatus').style.display = 'block';
    }

    if(r.ok){
      res.textContent += '\n\n✅ Demande envoyée ! Vérifiez votre téléphone.';
    }

  }catch(e){
    res.className='err';
    res.textContent = '❌ Erreur réseau:\n' + e.message
      + '\n\nVérifiez que /api/soleaspay.js est bien déployé sur Vercel.';
  }

  btn.disabled=false; btn.textContent='⚡ Tester le prélèvement (via proxy)';
}

async function verifierStatut(){
  if(!lastTxId) return;
  const res = document.getElementById('result');
  const btn = document.getElementById('btnStatus');
  btn.disabled=true; btn.textContent='⏳ Vérification...';
  res.textContent = 'Vérification statut ' + lastTxId + '...';

  try{
    const r = await fetch('/api/soleaspay?action=status&txId='+encodeURIComponent(lastTxId));
    const data = await r.json().catch(()=>({}));
    const status = (data.data?.status || data.status || '').toLowerCase();
    const emoji = ['success','successful','completed','paid'].includes(status) ? '✅'
                : ['failed','rejected','declined'].includes(status) ? '❌' : '⏳';
    res.className = emoji === '✅' ? 'ok' : '';
    res.textContent = `${emoji} Statut: ${status || 'en attente'}\n\n` + JSON.stringify(data, null, 2);
  }catch(e){
    res.className='err';
    res.textContent='Erreur: ' + e.message;
  }

  btn.disabled=false; btn.textContent='🔍 Vérifier le statut';
}
</script>
</body>
</html>
