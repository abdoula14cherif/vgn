<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test SoleasPay</title>
<style>
body{font-family:sans-serif;max-width:400px;margin:30px auto;padding:16px;background:#f5f5f5}
input,select{width:100%;padding:10px;margin-bottom:10px;border:1px solid #ccc;border-radius:8px;font-size:14px;box-sizing:border-box}
button{width:100%;padding:12px;background:#16A34A;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer}
button:disabled{opacity:.5}
pre{background:#111;color:#0f0;padding:12px;border-radius:8px;font-size:11px;overflow-x:auto;white-space:pre-wrap;margin-top:12px}
.err{color:#ef4444}.ok{color:#22c55e}
</style>
</head>
<body>
<h3>🧪 Test SoleasPay</h3>
<p style="font-size:12px;color:#666;margin-bottom:12px">Teste si l'API fonctionne avec un montant de 1 FCFA</p>

<select id="op">
  <option value="ORANGE_CM">🍊 Orange Money CM</option>
  <option value="MTN_CM">📱 MTN MoMo CM</option>
  <option value="WAVE_CM">🌊 Wave CM</option>
</select>
<input type="tel" id="phone" placeholder="Numéro (ex: 655000000)">
<button onclick="tester()" id="btn">🧪 Tester (1 FCFA)</button>
<pre id="result">En attente du test...</pre>

<script>
async function tester(){
  const btn=document.getElementById('btn');
  const res=document.getElementById('result');
  const phone=document.getElementById('phone').value.replace(/\s/g,'');
  const op=document.getElementById('op').value;
  if(!phone||phone.length<8){res.textContent='⚠️ Entrez un numéro valide';return;}
  btn.disabled=true;btn.textContent='⏳ Test en cours...';
  res.textContent='Envoi de la requête...';
  try{
    const r=await fetch('https://soleaspay.com/api/v1/payment/collect',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer SP_DQnD9bXH0-vd5R-jxtc0EXUsa_f0wUxBzCkW0AhCu6Q_AP',
        'Accept':'application/json'
      },
      body:JSON.stringify({
        amount:1,currency:'XAF',operator:op,phone:phone,
        reference:'TEST-'+Date.now(),description:'Test API',
        customer_name:'Test VGN',customer_email:'test@vgn.cm'
      })
    });
    const status=r.status;
    const data=await r.json().catch(()=>({}));
    res.className=r.ok?'ok':'err';
    res.textContent='HTTP '+status+'\n\n'+JSON.stringify(data,null,2);
  }catch(e){
    res.className='err';
    res.textContent='❌ Erreur réseau:\n'+e.message;
  }
  btn.disabled=false;btn.textContent='🧪 Tester (1 FCFA)';
}
</script>
</body>
</html>
