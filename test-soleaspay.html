<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Debug SoleasPay v3</title>
<style>
body{font-family:sans-serif;max-width:430px;margin:0 auto;padding:14px;background:#f5f5f5}
h3{margin-bottom:8px}
select,input{width:100%;padding:10px;margin-bottom:8px;border:1px solid #ccc;border-radius:8px;font-size:14px;box-sizing:border-box}
button{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:900;cursor:pointer;margin-bottom:6px;color:#fff}
.g{background:#16A34A}.b{background:#3B82F6}.r{background:#DC2626}.o{background:#F97316}
button:disabled{opacity:.5}
pre{background:#0d1117;color:#c9d1d9;padding:12px;border-radius:8px;font-size:11px;
    overflow-x:auto;white-space:pre-wrap;margin-top:10px;max-height:500px;overflow-y:auto}
.ok{color:#56d364}.err{color:#ff7b72}.warn{color:#e3b341}
.info{background:#fff;border:1px solid #ddd;border-radius:8px;padding:10px;font-size:12px;margin-bottom:10px;line-height:1.6}
</style>
</head>
<body>
<h3>🔬 Debug SoleasPay v3</h3>
<div class="info">
  Affiche la <b>réponse RAW complète</b> incluant headers.<br>
  Si <code>_raw: "{}"</code> → le problème vient de SoleasPay lui-même.
</div>

<select id="op">
  <option value="ORANGE_CM">🍊 ORANGE_CM</option>
  <option value="MTN_CM">📱 MTN_CM</option>
  <option value="WAVE_CM">🌊 WAVE_CM</option>
</select>
<input type="tel"    id="phone"  value="658033690">
<input type="number" id="amount" value="100">

<button class="g" onclick="tester()">⚡ Tester (afficher réponse RAW)</button>
<button class="o" onclick="testerTousFormats()">🔄 Tester tous formats + numéros</button>

<pre id="res">En attente...</pre>

<script>
function getParams(){
  return {
    op:     document.getElementById('op').value,
    phone:  document.getElementById('phone').value.replace(/\D/g,''),
    amount: parseInt(document.getElementById('amount').value)||100
  };
}

async function callProxy(op, phone, amount){
  const r = await fetch('/api/soleaspay?action=collect',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      amount, currency:'XAF', operator:op,
      phone, reference:'T-'+Date.now(),
      description:'Test VGN',
      customer_name:'Test', customer_email:'t@t.cm'
    })
  });
  const text = await r.text();
  let data = {};
  try{ data = JSON.parse(text); }catch(e){ data = {raw_text: text}; }
  return { status: r.status, data };
}

async function tester(){
  const {op, phone, amount} = getParams();
  const el = document.getElementById('res');
  el.className=''; el.textContent='⏳ Appel en cours...\n';

  try{
    const {status, data} = await callProxy(op, phone, amount);

    const raw     = data._raw || JSON.stringify(data);
    const txId    = data?.data?.transaction_id || data?.transaction_id || data?.id;
    const headers = data._headers || {};
    const ct      = headers['content-type'] || '?';

    el.className = status===200 && txId ? 'ok' : (status>=400 ? 'err' : 'warn');
    el.textContent =
      `HTTP Status : ${status}\n`+
      `Content-Type: ${ct}\n`+
      `TX ID       : ${txId || '❌ AUCUN'}\n`+
      `\n── _raw (réponse brute SoleasPay) ──\n${raw}\n`+
      `\n── JSON complet ──\n${JSON.stringify(data, null, 2)}`;

    if(!txId && status === 200){
      el.textContent += '\n\n⚠️ HTTP 200 mais réponse vide ou sans transaction_id.\n'
        + 'Cela signifie que SoleasPay accepte la requête mais ne démarre pas le paiement.\n'
        + '→ Problèmes possibles :\n'
        + '  1. Compte SoleasPay non activé pour les paiements sortants\n'
        + '  2. Clé API en mode TEST (pas Live)\n'
        + '  3. Format du numéro attendu différent (avec indicatif 237?)\n'
        + '  4. SoleasPay nécessite un compte Pro/vérifié\n';
    }

  }catch(e){
    el.className='err';
    el.textContent='❌ Erreur réseau:\n'+e.message;
  }
}

async function testerTousFormats(){
  const {phone, amount} = getParams();
  const el = document.getElementById('res');
  el.className=''; el.textContent='🔄 Test formats opérateur + numéros...\n\n';

  // Formats opérateurs à tester
  const ops = ['ORANGE_CM','MTN_CM','WAVE_CM','CM_ORANGE','CM_MTN'];
  // Formats de numéros à tester
  const phones = [
    phone,
    '237'+phone,
    '+237'+phone,
    phone.replace(/^0/,''),
  ];

  for(const op of ops){
    for(const ph of phones){
      try{
        const {status, data} = await callProxy(op, ph, amount);
        const raw  = data._raw || JSON.stringify(data).slice(0,80);
        const txId = data?.data?.transaction_id || data?.transaction_id || data?.id;
        const ok   = txId ? '✅' : (status>=400 ? '❌' : '⚠️ ');
        el.textContent += `${ok} ${op.padEnd(12)} | ${ph.padEnd(14)} | HTTP ${status} | ${raw.slice(0,60)}\n`;
        if(txId){
          el.textContent += `\n🎉 SUCCÈS ! op=${op} phone=${ph} txId=${txId}\n`;
          return;
        }
      }catch(e){
        el.textContent += `💥 ${op} | ${ph} | ERREUR: ${e.message}\n`;
      }
      await new Promise(r=>setTimeout(r,400));
    }
  }
  el.textContent += '\n⚠️ Aucun format n\'a déclenché de transaction.\n'
    + 'Le problème vient du compte SoleasPay, pas du code.';
}
</script>
</body>
</html>
