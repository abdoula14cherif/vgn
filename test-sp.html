<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Test SoleasPay</title>
<style>
body{font-family:monospace;background:#111;color:#0f0;padding:16px;font-size:13px;}
button{background:#16A34A;color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:14px;cursor:pointer;margin:6px 4px;}
button:hover{background:#15803D;}
button.red{background:#DC2626;}
pre{background:#1a1a1a;padding:12px;border-radius:8px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;border:1px solid #333;margin-top:8px;}
.ok{color:#4ade80;} .err{color:#f87171;} .warn{color:#facc15;}
input{background:#1a1a1a;color:#0f0;border:1px solid #333;padding:8px;border-radius:6px;width:100%;margin:4px 0;font-family:monospace;}
label{color:#aaa;font-size:12px;}
h2{color:#4ade80;margin:16px 0 8px;}
</style>
</head>
<body>
<h2>🔧 Test Proxy SoleasPay — VGN</h2>

<button onclick="testProxy()">✅ Test proxy</button>
<button onclick="scanEndpoints()" style="background:#7C3AED">🔍 Scanner endpoints</button>
<button onclick="testPay()">💳 Test paiement</button>
<button class="red" onclick="clearLog()">🗑 Effacer</button>

<div style="margin:12px 0">
  <label>Opérateur:</label>
  <select id="service" style="background:#1a1a1a;color:#0f0;border:1px solid #333;padding:8px;border-radius:6px;margin:4px 0;">
    <option value="orange_money_CM">Orange Money</option>
    <option value="mtn_mobile_money_CM">MTN MoMo</option>
  </select>
  <label>Numéro:</label>
  <input id="wallet" value="658033690" type="tel"/>
  <label>Montant (XAF):</label>
  <input id="amount" value="500" type="number"/>
</div>

<div id="log"></div>

<script>
function log(msg, cls='') {
  const el = document.getElementById('log');
  const pre = document.createElement('pre');
  pre.className = cls;
  pre.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
  el.prepend(pre);
}
function clearLog() { document.getElementById('log').innerHTML=''; }

async function scanEndpoints() {
  log('🔍 Scan de tous les endpoints SoleasPay...');
  try {
    const r = await fetch('/api/soleaspay?action=scan');
    const d = await r.json();
    if(d.results) {
      let txt = 'Résultats scan:\n';
      for(const [url, result] of Object.entries(d.results)) {
        const ok = !result.includes('HTML') && !result.includes('Erreur') && !result.includes('404');
        txt += (ok ? '✅' : '❌') + ' ' + url + '\n   → ' + result + '\n';
      }
      log(txt, 'ok');
    } else {
      log(JSON.stringify(d, null, 2), 'warn');
    }
  } catch(e) {
    log('❌ ' + e.message, 'err');
  }
}

async function testProxy() {
  log('⏳ Test proxy en cours...');
  try {
    const r = await fetch('/api/soleaspay?action=test');
    const d = await r.json();
    log('Proxy réponse HTTP ' + r.status + ':\n' + JSON.stringify(d, null, 2), r.ok ? 'ok' : 'err');
  } catch(e) {
    log('❌ ERREUR: ' + e.message + '\n\nSi 404 → le fichier api/soleaspay.js n\'est pas déployé !', 'err');
  }
}

async function testPay() {
  const service = document.getElementById('service').value;
  const wallet  = document.getElementById('wallet').value;
  const amount  = document.getElementById('amount').value;
  
  log(`⏳ Test paiement: ${service} / ${wallet} / ${amount} XAF`);
  
  try {
    const r = await fetch('/api/soleaspay?action=pay', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        service, wallet, amount: Number(amount),
        currency: 'XAF',
        order_id: 'TEST-' + Date.now()
      })
    });
    const d = await r.json();
    const ok = d.status === 'success' || d.success === true;
    log('Réponse HTTP ' + r.status + ':\n' + JSON.stringify(d, null, 2), ok ? 'ok' : 'warn');
    
    // Afficher quel endpoint a fonctionné
    if(d._endpoint_used) log('🔗 Endpoint valide: ' + d._endpoint_used, 'ok');
    if(d._endpoints_tried) log('❌ Tous ces endpoints ont échoué:\n' + d._endpoints_tried.join('\n'), 'err');

    if(d.token || d.transaction_id) {
      const token = d.token || d.transaction_id;
      log('🔑 Token: ' + token + '\n→ Lance le test statut dans 10s...', 'ok');
      setTimeout(() => testStatus(token), 10000);
    }
    if(d.url) {
      log('🔗 URL de paiement: ' + d.url, 'ok');
    }
  } catch(e) {
    log('❌ ERREUR: ' + e.message, 'err');
  }
}

async function testStatus(token) {
  log('⏳ Vérification statut token: ' + token);
  try {
    const r = await fetch('/api/soleaspay?action=status&token=' + encodeURIComponent(token));
    const d = await r.json();
    log('Statut HTTP ' + r.status + ':\n' + JSON.stringify(d, null, 2), 
        d.status === 'success' ? 'ok' : d.status === 'failed' ? 'err' : 'warn');
  } catch(e) {
    log('❌ ERREUR statut: ' + e.message, 'err');
  }
}
</script>
</body>
</html>
