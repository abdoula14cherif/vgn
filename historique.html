<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>VGN – Historique</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --g:#16A34A;--gd:#15803D;--gl:#22C55E;
  --o:#F97316;--od:#EA580C;
  --r:#DC2626;--b:#3B82F6;
  --bg:#F0F4F0;--card:#fff;--txt:#111827;--mu:#6B7280;--bd:#E5E7EB;
  --H:56px;--B:58px;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)
}
html{font-family:'Nunito',sans-serif;background:var(--bg)}
body{max-width:430px;margin:0 auto;background:var(--bg);overflow-x:hidden}

.topbar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  height:calc(var(--H) + var(--sat));background:linear-gradient(135deg,var(--gd),var(--gl));
  display:flex;align-items:center;justify-content:space-between;padding:var(--sat) 14px 0;
  z-index:999;box-shadow:0 2px 12px rgba(0,0,0,.18)}
.tbk{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);
  border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;font-weight:900;color:#fff;text-decoration:none}
.tbt{font-size:1rem;font-weight:900;color:#fff}
.tb-pill{font-size:.67rem;font-weight:800;color:#fff;background:rgba(255,255,255,.18);
  padding:4px 10px;border-radius:16px;border:1px solid rgba(255,255,255,.28)}

.scroll{padding-top:calc(var(--H) + var(--sat));padding-bottom:calc(var(--B) + var(--sab) + 24px);min-height:100svh}

/* HERO SOLDE */
.hero{background:linear-gradient(135deg,#14532D,var(--g),var(--gl));padding:20px 16px 22px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.05)}
.hero-lbl{font-size:.68rem;font-weight:800;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.hero-solde{font-size:2.2rem;font-weight:900;color:#fff;line-height:1;margin-bottom:4px}
.hero-currency{font-size:.72rem;color:rgba(255,255,255,.5);margin-bottom:14px;font-weight:600}
.hero-mini{display:flex;gap:10px}
.hm{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 12px;flex:1;text-align:center;border:1px solid rgba(255,255,255,.15)}
.hm-v{font-size:.9rem;font-weight:900;color:#fff}
.hm-l{font-size:.58rem;color:rgba(255,255,255,.6);margin-top:1px;font-weight:700}

/* TABS */
.tabs{background:var(--card);display:flex;border-bottom:2px solid var(--bd);
  position:sticky;top:calc(var(--H)+var(--sat));z-index:98}
.tab{flex:1;text-align:center;padding:11px 0;font-size:.75rem;font-weight:800;
  color:var(--mu);cursor:pointer;transition:color .2s;position:relative}
.tab.on{color:var(--g)}
.tab.on::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2.5px;background:var(--g);border-radius:2px}

/* FILTRES */
.filter-bar{background:var(--card);padding:10px 14px;border-bottom:1px solid var(--bd);
  display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 12px;border-radius:16px;font-size:.7rem;font-weight:800;
  cursor:pointer;border:1.5px solid var(--bd);color:var(--mu);background:#F8FAFB;transition:all .15s}
.chip.on{background:var(--g);color:#fff;border-color:var(--g)}

/* TRANSACTION ITEMS */
.date-sep{padding:12px 14px 5px;font-size:.65rem;font-weight:900;color:var(--mu);
  text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:8px}
.date-sep::after{content:'';flex:1;height:1px;background:var(--bd)}

.tx-list{padding:0 12px;display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
.tx{background:var(--card);border-radius:14px;padding:12px 14px;
  display:flex;align-items:center;gap:11px;box-shadow:0 1px 6px rgba(0,0,0,.05);
  border-left:3.5px solid transparent;transition:transform .15s}
.tx:active{transform:scale(.98)}
.tx.income{border-left-color:var(--g)}
.tx.expense{border-left-color:var(--r)}
.tx.pending{border-left-color:var(--o)}
.tx.neutral{border-left-color:var(--b)}

.tx-ico{width:40px;height:40px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.ic-income{background:#DCFCE7}.ic-expense{background:#FEE2E2}
.ic-pending{background:#FFF7ED}.ic-neutral{background:#EFF6FF}

.tx-info{flex:1;min-width:0}
.tx-name{font-size:.8rem;font-weight:800;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-sub{font-size:.62rem;color:var(--mu);margin-top:2px;font-weight:600}

.tx-right{text-align:right;flex-shrink:0}
.tx-amt{font-size:.9rem;font-weight:900}
.amt-inc{color:var(--g)}.amt-exp{color:var(--r)}.amt-pend{color:var(--o)}.amt-neu{color:var(--b)}
.tx-stat{font-size:.58rem;font-weight:800;padding:2px 7px;border-radius:7px;margin-top:3px;display:inline-block}
.st-ok{background:#DCFCE7;color:#15803D}
.st-wait{background:#FFF7ED;color:#C2410C}
.st-rej{background:#FEE2E2;color:var(--r)}

/* EMPTY */
.empty-state{text-align:center;padding:44px 20px;color:var(--mu)}
.empty-ico{font-size:3rem;margin-bottom:12px}
.empty-t{font-size:.9rem;font-weight:800;color:var(--txt);margin-bottom:6px}
.empty-s{font-size:.72rem;font-weight:600;line-height:1.6}

/* RÉSUMÉ */
.summary-bar{margin:12px 12px 0;background:var(--card);border-radius:14px;padding:12px 14px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:6px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.sb-item{text-align:center}
.sb-v{font-size:.88rem;font-weight:900}
.sb-v.inc{color:var(--g)}.sb-v.exp{color:var(--r)}.sb-v.bal{color:var(--b)}
.sb-l{font-size:.58rem;font-weight:700;color:var(--mu);margin-top:2px}

/* BOTNAV */
.botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  height:calc(var(--B) + var(--sab));padding-bottom:var(--sab);background:#fff;
  border-top:1px solid var(--bd);display:flex;align-items:center;z-index:999;
  box-shadow:0 -2px 10px rgba(0,0,0,.07)}
.bn{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;padding:6px 0;text-decoration:none;position:relative}
.bn.on::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:3px;background:var(--g);border-radius:0 0 3px 3px}
.bni{font-size:1.2rem}.bnl{font-size:.57rem;font-weight:800;color:var(--mu)}
.bn.on .bnl{color:var(--g)}

.tst{position:fixed;top:calc(var(--H)+var(--sat)+10px);left:50%;transform:translateX(-50%) translateY(-80px);
  background:#0F172A;color:#fff;padding:10px 22px;border-radius:24px;font-size:.77rem;font-weight:700;
  z-index:9999;white-space:nowrap;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
.tst.show{transform:translateX(-50%) translateY(0)}.tst.ok{background:var(--g)}.tst.err{background:#DC2626}

.ld{display:inline-block;width:18px;height:18px;border:3px solid var(--bd);border-top-color:var(--g);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-wrap{text-align:center;padding:44px;color:var(--mu)}

/* LOAD MORE */
.load-more{margin:12px;background:var(--card);border:1.5px solid var(--bd);border-radius:12px;
  padding:12px;width:calc(100% - 24px);font-family:'Nunito',sans-serif;font-size:.78rem;
  font-weight:800;color:var(--mu);cursor:pointer;transition:all .15s}
.load-more:active{background:#F8FAFB}
</style>
</head>
<body>

<div class="topbar">
  <a class="tbk" href="rapport.html">‹</a>
  <span class="tbt">📜 Historique</span>
  <div class="tb-pill" id="tb-total">0 txn</div>
</div>

<div class="tst" id="tst"></div>

<div class="scroll">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-lbl">Solde disponible</div>
    <div class="hero-solde" id="hero-solde">0</div>
    <div class="hero-currency">Francs CFA · XAF</div>
    <div class="hero-mini">
      <div class="hm"><div class="hm-v" id="hm-entrees">0</div><div class="hm-l">↗ Entrées</div></div>
      <div class="hm"><div class="hm-v" id="hm-sorties">0</div><div class="hm-l">↙ Sorties</div></div>
      <div class="hm"><div class="hm-v" id="hm-invest">0</div><div class="hm-l">📈 Investi</div></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab on" id="tab-btn-all" onclick="switchTab('all')">Tout</div>
    <div class="tab" id="tab-btn-recharge" onclick="switchTab('recharge')">Recharges</div>
    <div class="tab" id="tab-btn-retrait" onclick="switchTab('retrait')">Retraits</div>
    <div class="tab" id="tab-btn-taches" onclick="switchTab('taches')">Tâches</div>
  </div>

  <!-- FILTRES PERIODE -->
  <div class="filter-bar">
    <div class="chip on" id="chip-all" onclick="setPeriod('all',this)">Tout</div>
    <div class="chip" id="chip-today" onclick="setPeriod('today',this)">Aujourd'hui</div>
    <div class="chip" id="chip-week" onclick="setPeriod('week',this)">7 jours</div>
    <div class="chip" id="chip-month" onclick="setPeriod('month',this)">30 jours</div>
  </div>

  <!-- RÉSUMÉ PÉRIODE -->
  <div class="summary-bar" id="summary-bar">
    <div class="sb-item"><div class="sb-v inc" id="sum-inc">0 F</div><div class="sb-l">Entrées</div></div>
    <div class="sb-item"><div class="sb-v exp" id="sum-exp">0 F</div><div class="sb-l">Sorties</div></div>
    <div class="sb-item"><div class="sb-v bal" id="sum-cnt">0</div><div class="sb-l">Transactions</div></div>
  </div>

  <!-- LISTE -->
  <div id="tx-container">
    <div class="loading-wrap"><div class="ld"></div></div>
  </div>

  <button class="load-more" id="btn-more" style="display:none" onclick="loadMore()">
    ⬇ Charger plus
  </button>

</div>

<nav class="botnav">
  <a class="bn" href="dashboard.html"><span class="bni">🏠</span><span class="bnl">Accueil</span></a>
  <a class="bn" href="taches.html"><span class="bni">✅</span><span class="bnl">Tâches</span></a>
  <a class="bn on" href="rapport.html"><span class="bni">📊</span><span class="bnl">Rapports</span></a>
  <a class="bn" href="profil.html"><span class="bni">👤</span><span class="bnl">Mon Compte</span></a>
</nav>

<script>
const SB = supabase.createClient(
  'https://tgrfzybemuwvhkbpuzmz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRncmZ6eWJlbXV3dmhrYnB1em16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMDMwOTgsImV4cCI6MjA4NzY3OTA5OH0.M20AwabfyHK_btwhgCmdUUbP2IAtY4TeYbc3Ovzj7CE',
  {auth:{persistSession:true,storageKey:'vgn-auth',storage:window.localStorage}}
);

const $=id=>document.getElementById(id);
const $s=(id,v)=>{const e=$(id);if(e)e.textContent=v};
const fmt=n=>Number(n||0).toLocaleString('fr-FR');
const fmtF=n=>fmt(n)+' F';
function toast(m,t=''){const el=$('tst');el.textContent=m;el.className='tst show'+(t?' '+t:'');setTimeout(()=>el.className='tst',3000)}

let U=null, ALL_TX=[], curTab='all', curPeriod='all', PAGE=50, offset=0;

function td(){return new Date().toISOString().slice(0,10)}

function dtFmt(s){
  const d=new Date(s);
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})+' · '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
function dateSepStr(s){
  const d=new Date(s);
  const now=new Date();
  const diff=Math.floor((now-d)/(1000*60*60*24));
  if(diff===0)return "Aujourd'hui";
  if(diff===1)return "Hier";
  if(diff<7)return d.toLocaleDateString('fr-FR',{weekday:'long'});
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
}

function switchTab(t){
  curTab=t;
  ['all','recharge','retrait','taches'].forEach(k=>{
    const el=$('tab-btn-'+k);
    if(el)el.className='tab'+(k===t?' on':'');
  });
  render();
}

function setPeriod(p, el){
  curPeriod=p;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  render();
}

function filterTx(txs){
  let d=[...txs];
  // Tab
  if(curTab==='recharge') d=d.filter(t=>t.type==='recharge'||t._src==='recharge');
  else if(curTab==='retrait') d=d.filter(t=>t.type==='retrait');
  else if(curTab==='taches') d=d.filter(t=>t.type==='tache'||t._src==='tache');
  // Période
  const now=new Date();
  if(curPeriod==='today') d=d.filter(t=>new Date(t.created_at).toISOString().slice(0,10)===td());
  else if(curPeriod==='week'){const w=new Date(now);w.setDate(w.getDate()-7);d=d.filter(t=>new Date(t.created_at)>=w);}
  else if(curPeriod==='month'){const m=new Date(now);m.setDate(m.getDate()-30);d=d.filter(t=>new Date(t.created_at)>=m);}
  return d;
}

function txConfig(t){
  const type=t.type||'';
  const statut=t.statut||'valide';

  if(type==='recharge')return{
    ico:'💰',icoCls:'ic-income',cls:'income',
    name:'Recharge — '+(t.methode||t.operateur||'—'),
    sub:t.note||t.ref_transaction||'—',
    amtCls:'amt-inc',sign:'+',
    stCls:statut==='valide'?'st-ok':statut==='rejete'?'st-rej':'st-wait',
    stLbl:statut==='valide'?'Validé':statut==='rejete'?'Rejeté':'En attente'
  };
  if(type==='retrait')return{
    ico:'🏧',icoCls:'ic-expense',cls:'expense',
    name:'Retrait — '+(t.methode||'—'),
    sub:t.compte||t.note||'—',
    amtCls:'amt-exp',sign:'-',
    stCls:statut==='valide'?'st-ok':statut==='rejete'?'st-rej':'st-wait',
    stLbl:statut==='valide'?'Payé':statut==='rejete'?'Rejeté':'En attente'
  };
  if(type==='tache'||t._src==='tache')return{
    ico:'✅',icoCls:'ic-income',cls:'income',
    name:'Gain tâche',
    sub:t.note||t.type_tache||'Tâche complétée',
    amtCls:'amt-inc',sign:'+',
    stCls:'st-ok',stLbl:'Validé'
  };
  if(type==='commission')return{
    ico:'🤝',icoCls:'ic-neutral',cls:'neutral',
    name:'Commission parrainage',
    sub:t.note||'—',
    amtCls:'amt-neu',sign:'+',
    stCls:'st-ok',stLbl:'Crédité'
  };
  return{
    ico:'💸',icoCls:'ic-neutral',cls:'neutral',
    name:type||'Transaction',sub:t.note||'—',
    amtCls:'amt-neu',sign:'',stCls:'st-ok',stLbl:'OK'
  };
}

function render(){
  const txs=filterTx(ALL_TX);

  // Résumé
  let inc=0,exp=0;
  txs.forEach(t=>{
    const cfg=txConfig(t);
    if(cfg.sign==='+')inc+=(t.montant||t.reward||0);
    if(cfg.sign==='-')exp+=(t.montant||0);
  });
  $s('sum-inc',fmtF(inc));
  $s('sum-exp',fmtF(exp));
  $s('sum-cnt',txs.length+' txn');
  $s('tb-total',txs.length+' txn');

  if(!txs.length){
    $('tx-container').innerHTML=`<div class="empty-state">
      <div class="empty-ico">📭</div>
      <div class="empty-t">Aucune transaction</div>
      <div class="empty-s">Vos transactions apparaîtront ici<br>après votre première activité.</div>
    </div>`;
    $('btn-more').style.display='none';
    return;
  }

  // Grouper par date
  const groups={};
  txs.forEach(t=>{
    const d=new Date(t.created_at).toISOString().slice(0,10);
    if(!groups[d])groups[d]=[];
    groups[d].push(t);
  });

  let html='';
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    html+=`<div class="date-sep">${dateSepStr(date+'T12:00:00')}</div><div class="tx-list">`;
    groups[date].forEach(t=>{
      const cfg=txConfig(t);
      const amt=t.montant||t.reward||0;
      html+=`<div class="tx ${cfg.cls}">
        <div class="tx-ico ${cfg.icoCls}">${cfg.ico}</div>
        <div class="tx-info">
          <div class="tx-name">${cfg.name}</div>
          <div class="tx-sub">${cfg.sub} · ${dtFmt(t.created_at)}</div>
        </div>
        <div class="tx-right">
          <div class="tx-amt ${cfg.amtCls}">${cfg.sign}${fmtF(amt)}</div>
          <span class="tx-stat ${cfg.stCls}">${cfg.stLbl}</span>
        </div>
      </div>`;
    });
    html+='</div>';
  });

  $('tx-container').innerHTML=html;
}

async function loadMore(){
  offset+=PAGE;
  const{data:more}=await SB.from('transactions')
    .select('*').eq('user_id',U.id)
    .order('created_at',{ascending:false})
    .range(offset,offset+PAGE-1);
  if(more&&more.length){
    ALL_TX=[...ALL_TX,...more];
    render();
    if(more.length<PAGE)$('btn-more').style.display='none';
  } else {
    $('btn-more').style.display='none';
    toast('Tout est chargé ✓','ok');
  }
}

async function init(){
  const{data:{session}}=await SB.auth.getSession();
  if(!session){window.location.href='index.html';return}
  U=session.user;

  const[{data:p},{data:txs},{data:taches},{data:recharges}]=await Promise.all([
    SB.from('profiles').select('solde,investissement,gains_totaux').eq('id',U.id).single(),
    SB.from('transactions').select('*').eq('user_id',U.id).order('created_at',{ascending:false}).limit(PAGE),
    SB.from('taches_completees').select('*').eq('user_id',U.id).order('completee_le',{ascending:false}).limit(200),
    SB.from('recharges').select('*').eq('user_id',U.id).order('created_at',{ascending:false}).limit(50),
  ]);

  // Hero
  $s('hero-solde',fmt(p?.solde||0));
  $s('hm-invest',fmtF(p?.investissement||0));

  // Combiner toutes les sources en une liste unifiée
  const txList=txs||[];
  const tacheAsTx=(taches||[]).map(t=>({
    ...t,_src:'tache',type:'tache',
    montant:t.reward||0,
    created_at:t.completee_le||t.created_at,
    statut:'valide',
    note:t.type_tache||'Tâche'
  }));
  const rechargeAsTx=(recharges||[]).map(r=>({
    ...r,_src:'recharge',type:'recharge',
    montant:r.montant_envoye||r.plan_depot||0,
    methode:r.operateur,
    note:r.ref_transaction||r.plan_label
  }));

  ALL_TX=[...txList,...tacheAsTx,...rechargeAsTx]
    .sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

  // Calcul entrées / sorties
  let totalInc=0,totalExp=0;
  ALL_TX.forEach(t=>{
    const cfg=txConfig(t);
    const amt=t.montant||t.reward||0;
    if(cfg.sign==='+')totalInc+=amt;
    if(cfg.sign==='-')totalExp+=amt;
  });
  $s('hm-entrees',fmtF(totalInc));
  $s('hm-sorties',fmtF(totalExp));
  $s('tb-total',ALL_TX.length+' txn');

  if((txs||[]).length>=PAGE)$('btn-more').style.display='block';

  render();
}

init();
</script>
</body>
</html>
